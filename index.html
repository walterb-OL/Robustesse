/* ═══════════════════════ PROCEDURAL CERNE ═══════════════════════ */

function ringPath(cx, cy, baseR, seed, nPts) {
  const pts = [];
  for (let i = 0; i <= nPts; i++) {
    const a = (i / nPts) * Math.PI * 2;
    const n = Math.sin(a*3+seed*7.3)*0.12 + Math.sin(a*5+seed*13.1)*0.07
            + Math.sin(a*7+seed*3.7)*0.04 + Math.sin(a*2+seed*19.9)*0.09;
    const r = baseR * (1 + n);
    pts.push([cx + r*Math.cos(a), cy + r*Math.sin(a)]);
  }
  let d = "M "+pts[0][0]+" "+pts[0][1];
  for (let i = 1; i < pts.length; i++) {
    const p = pts[i-1], c = pts[i];
    d += " Q "+p[0]+" "+p[1]+" "+((p[0]+c[0])/2)+" "+((p[1]+c[1])/2);
  }
  return d + " Z";
}

function Cerne({ size, rings, sw, op, cx, cy, maxR, clip }) {
  const paths = useMemo(() => {
    const r = [];
    for (let i = 0; i < rings; i++) {
      const t = i/(rings-1);
      const rad = 4 + t*maxR;
      const seed = i*1.37+0.5;
      const accent = (i%4===2||i%5===3) && i>2;
      const w = accent ? sw*1.8 : sw*(0.5+t*0.8);
      const o = accent ? op*1.4 : op*(0.3+t*0.7);
      r.push({ d: ringPath(cx,cy,rad,seed,64+Math.floor(t*32)), sw: Math.min(w,2.2), op: Math.min(o,0.9) });
    }
    return r;
  }, [size, rings, sw, op, cx, cy, maxR]);
  const cid = clip ? "cc"+Math.random().toString(36).substr(2,4) : null;
  return (
    <svg viewBox={"0 0 "+size+" "+size} width="100%" style={{ display: "block" }}>
      {clip && <defs><clipPath id={cid}><rect x={cx} y="0" width={size/2} height={size}/></clipPath></defs>}
      <g clipPath={cid ? "url(#"+cid+")" : undefined}>
        {paths.map((p,i) => <path key={i} d={p.d} fill="none" stroke={C.vert} strokeWidth={p.sw} opacity={p.op}/>)}
      </g>
    </svg>
  );
}

/* ═══════════════════════ SÉLECTION SELON MODE ═══════════════════════ */

function buildQS(mode) {
  if (mode === "magnet") {
    // 12 questions scorées (magnet:true) + 1 ouverte + miroir + ouverte finale
    const scored = ALL_QUESTIONS.filter(q => !q.type && q.magnet);
    // Insérer une question ouverte au milieu
    const mid = Math.floor(scored.length / 2);
    const withOpen = [
      ...scored.slice(0, mid),
      { id:"openM", type:"open", text:"En une phrase : quel est le sujet que votre Codir ne regarde pas en face ?" },
      ...scored.slice(mid),
      { id:"mirrorM", type:"mirror",
        text:"Relisez vos réponses. Combien intègrent les contraintes des 10 prochaines années ?",
        subtext:"Ce qui ne figure pas dans votre grille de lecture ne figure pas dans vos décisions." },
    ];
    return withOpen;
  }
  // Mode complet : toutes les questions
  return ALL_QUESTIONS;
}

/* ═══════════════════════ SCORING ═══════════════════════ */

function getZone(t, max) {
  const pct = t / max;
  if (pct >= 0.80) return {zone:"Robuste",    color:C.vert,    msg:"Votre modèle présente des bases solides. L'enjeu : vérifier que votre Codir partage cette lecture — et anticiper les chocs à venir avant qu'ils ne testent cette robustesse."};
  if (pct >= 0.55) return {zone:"Vigilant",   color:C.ocre,    msg:"Vous avez conscience de certaines vulnérabilités, mais des angles morts subsistent. La question n'est pas si un choc arrivera, mais quand. Mieux vaut le simuler que le subir."};
  if (pct >= 0.30) return {zone:"Exposé",     color:C.brique,  msg:"Votre modèle repose sur des dépendances fortes et peu diversifiées. Un choc sur votre chaîne — client, fournisseur, énergie, compétence — aurait un impact structurel."};
  return                  {zone:"Fragile",    color:"#8B2020", msg:"Plusieurs fondations de votre modèle sont vulnérables simultanément. La pérennité de votre entreprise mérite une attention stratégique immédiate."};
}

/* ═══════════════════════ RADAR SVG ═══════════════════════ */

function Radar({ data, max }) {
  // sz plus grand, rayon réduit, marge généreuse pour les labels
  const sz=380, cx=sz/2, cy=sz/2, r=100, n=data.length, st=-Math.PI/2, s=(2*Math.PI)/n;
  const labelDist = r + 38; // distance label depuis centre
  function pt(i,v){const a=st+i*s,d=(v/max)*r;return[cx+d*Math.cos(a),cy+d*Math.sin(a)];}
  return(
    <svg viewBox={"0 0 "+sz+" "+sz} style={{width:"100%",maxWidth:360,display:"block",margin:"0 auto",overflow:"visible"}}>
      {[0.25,0.5,0.75,1].map((p,ri)=><polygon key={ri} points={Array.from({length:n},(_,i)=>pt(i,max*p).join(",")).join(" ")} fill="none" stroke={C.sable} strokeWidth="1"/>)}
      {Array.from({length:n},(_,i)=>{const[x2,y2]=pt(i,max);return<line key={i} x1={cx} y1={cy} x2={x2} y2={y2} stroke={C.sable} strokeWidth="1"/>;})}
      <polygon points={data.map((d,i)=>pt(i,Math.max(d.score,0.3)).join(",")).join(" ")} fill={C.vert} fillOpacity="0.13" stroke={C.vert} strokeWidth="2.5" strokeLinejoin="round"/>
      {data.map((d,i)=>{const[x,y]=pt(i,Math.max(d.score,0.3));return<circle key={i} cx={x} cy={y} r="5" fill={C.ocre} stroke={C.vert} strokeWidth="2"/>;})}
      {data.map((d,i)=>{
        const a=st+i*s;
        const lx=cx+labelDist*Math.cos(a);
        const ly=cy+labelDist*Math.sin(a);
        // Ancrage texte selon position angulaire
        let an="middle";
        if(Math.cos(a)>0.2) an="start";
        if(Math.cos(a)<-0.2) an="end";
        // Décalage vertical pour les labels latéraux
        const dy = Math.abs(Math.cos(a))>0.7 ? 0 : (Math.sin(a)>0 ? 4 : -4);
        return(
          <text key={i} x={lx} y={ly+dy} textAnchor={an} dominantBaseline="central"
            style={{fontSize:"12px",fontFamily:serif,fill:C.grisFonce,fontWeight:600}}>
            {d.axis}
          </text>
        );
      })}
    </svg>
  );
}

        <span style={{fontSize:"13px",color:C.gris}}>Open Lande</span>

    </div>
  );
}

/* ═══════════════════════ APP ═══════════════════════ */

function App() {
  const [mode, setMode] = useState(null);
  const [stp,setStp]=useState(-1);
  const [ans,setAns]=useState({});
  const [sel,setSel]=useState({});
  const [opn,setOpn]=useState({});
  const [anim,setAnim]=useState(false);
  const [done,setDone]=useState(false);
  const [emailStep,setEmailStep]=useState(false);
  const [email,setEmail]=useState("");
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(false);

  const QS = useMemo(() => mode ? buildQS(mode) : [], [mode]);
  const q=stp>=0&&QS.length?QS[stp]:null;
  const isS=q&&!q.type, isO=q&&q.type==="open", isM=q&&q.type==="mirror";
  const sI=q?QS.filter(x=>!x.type).indexOf(q)+1:0;
  const tS=QS.filter(x=>!x.type).length;
  const aI=isS?AXES.findIndex(a=>a.key===q.axe):-1;

  function nxt(){setAnim(true);setTimeout(()=>{
    if(stp+1>=QS.length){setEmailStep(true);}
    else{setStp(stp+1);}
    setAnim(false);
  },280);}
  function bck(){if(stp>0){setAnim(true);setTimeout(()=>{setStp(stp-1);setAnim(false);},280);}}

  function sc(){
    const s={};
    AXES.forEach(a=>{
      const qs=QS.filter(x=>x.axe===a.key);
      s[a.key]=qs.reduce((c,x)=>c+(ans[x.id]||0),0);
    });
    return s;
  }

  async function submitAndShow() {
    setSending(true);
    const s=sc();
    const maxScore=QS.filter(x=>x.axe).reduce((acc,q)=>acc+(q.options?Math.max(...q.options.map(o=>o.score)):0),0);
    const total=Object.values(s).reduce((a,b)=>a+b,0);
    const zone=getZone(total,maxScore);
    const payload={
      timestamp: new Date().toISOString(),
      mode,
      email: email||"(anonyme)",
      zone: zone.zone,
      score_total: total,
      score_max: maxScore,
      ...Object.fromEntries(AXES.map(a=>["axe_"+a.key, s[a.key]])),
      open1: opn["open1"]||opn["openM"]||"",
      open2: opn["open2"]||"",
      open3: opn["open3"]||"",
    };
    await sendToSheets(payload);
    setSending(false);
    setSent(true);
    setEmailStep(false);
    setDone(true);
  }

  /* ─── CHOIX DU MODE ─── */
  if (!mode) return (
    <div style={{minHeight:"100vh",background:C.vert,display:"flex",flexDirection:"column"}}>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"60px 24px 40px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:"-12%",top:"50%",transform:"translateY(-50%)",width:"min(65vw, 500px)",height:"min(65vw, 500px)",opacity:0.1,pointerEvents:"none"}}>
          <Cerne size={400} rings={22} sw={1.4} op={1} cx={200} cy={200} maxR={180} clip={true}/>
        </div>
        <div style={{maxWidth:560,textAlign:"center",position:"relative",zIndex:2}}>
          <div style={{width:64,height:64,margin:"0 auto 28px",opacity:0.8,animation:"fadeUp 0.6s 0.1s both"}}>
            <Cerne size={200} rings={14} sw={1.5} op={0.65} cx={100} cy={100} maxR={88}/>
          </div>
          <div style={{fontSize:"11px",letterSpacing:"4px",textTransform:"uppercase",color:C.ocre,marginBottom:28,fontWeight:600,animation:"fadeUp 0.6s 0.2s both"}}>
            Open Lande — Le test de robustesse
          </div>
          <h1 style={{fontFamily:serif,fontSize:"clamp(26px, 5vw, 40px)",color:C.blanc,lineHeight:1.15,fontWeight:700,marginBottom:20,animation:"fadeUp 0.7s 0.3s both"}}>
            Le diagnostic<br/>de <span style={{color:C.ocre,fontStyle:"italic"}}>robustesse</span>
          </h1>
          <p style={{fontFamily:serif,fontSize:"clamp(14px, 2.2vw, 17px)",color:C.sable,lineHeight:1.6,marginBottom:40,fontStyle:"italic",animation:"fadeUp 0.7s 0.45s both"}}>
            Choisissez votre format
          </p>

          {/* Deux cartes */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:40,animation:"fadeUp 0.7s 0.55s both"}}>
            {/* Magnet */}
            <button onClick={()=>{setMode("magnet");setStp(0);}}
              style={{background:"rgba(255,255,255,0.07)",border:"2px solid rgba(249,178,51,0.4)",padding:"24px 20px",cursor:"pointer",textAlign:"left",transition:"all 0.25s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(249,178,51,0.12)";e.currentTarget.style.borderColor=C.ocre;}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.07)";e.currentTarget.style.borderColor="rgba(249,178,51,0.4)";}}>
              <div style={{fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:C.ocre,fontWeight:600,marginBottom:10}}>Format court</div>
              <div style={{fontFamily:serif,fontSize:"clamp(18px, 3vw, 24px)",color:C.blanc,fontWeight:700,marginBottom:8}}>12 questions</div>
              <div style={{fontSize:"13px",color:C.gris,lineHeight:1.5}}>5 minutes · Premier aperçu de vos vulnérabilités</div>
            </button>
            {/* Complet */}
            <button onClick={()=>{setMode("complet");setStp(0);}}
              style={{background:"rgba(255,255,255,0.07)",border:"2px solid rgba(255,255,255,0.15)",padding:"24px 20px",cursor:"pointer",textAlign:"left",transition:"all 0.25s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.12)";e.currentTarget.style.borderColor="rgba(255,255,255,0.4)";}  }
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.07)";e.currentTarget.style.borderColor="rgba(255,255,255,0.15)";}}>
              <div style={{fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:C.sable,fontWeight:600,marginBottom:10}}>Format complet</div>
              <div style={{fontFamily:serif,fontSize:"clamp(18px, 3vw, 24px)",color:C.blanc,fontWeight:700,marginBottom:8}}>30 questions</div>
              <div style={{fontSize:"13px",color:C.gris,lineHeight:1.5}}>15 minutes · Diagnostic approfondi sur 5 axes</div>
            </button>
          </div>

          <p style={{fontFamily:serif,fontSize:"12px",fontStyle:"italic",color:C.gris,lineHeight:1.5,animation:"fadeUp 0.7s 0.7s both"}}>{BASELINE}</p>
        </div>
      </div>
    </div>
  );

  /* ─── ÉTAPE EMAIL ─── */
  if(emailStep){
    return(
      <div style={{minHeight:"100vh",background:C.vert,display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 24px"}}>
        <div style={{maxWidth:480,width:"100%",textAlign:"center"}}>
          <div style={{width:48,height:48,margin:"0 auto 24px",opacity:0.7}}>
            <Cerne size={200} rings={14} sw={1.5} op={0.65} cx={100} cy={100} maxR={88}/>
          </div>
          <h2 style={{fontFamily:serif,fontSize:"clamp(22px, 4vw, 30px)",color:C.blanc,fontWeight:700,marginBottom:16,lineHeight:1.3}}>
            Votre diagnostic est prêt
          </h2>
          <p style={{fontSize:"15px",color:C.sable,lineHeight:1.6,marginBottom:32,fontStyle:"italic"}}>
            Laissez votre email pour recevoir vos résultats — ou continuez directement.
          </p>
          <input
            type="email"
            value={email}
            onChange={e=>setEmail(e.target.value)}
            placeholder="votre@email.fr (facultatif)"
            style={{width:"100%",padding:"14px 18px",fontSize:"15px",border:"2px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.08)",color:C.blanc,outline:"none",marginBottom:12,fontFamily:"inherit"}}
            onFocus={e=>e.target.style.borderColor=C.ocre}
            onBlur={e=>e.target.style.borderColor="rgba(255,255,255,0.2)"}

          <button onClick={submitAndShow} disabled={sending}
            style={{width:"100%",background:C.ocre,color:C.vert,border:"none",padding:"16px",fontSize:"15px",fontWeight:700,cursor:"pointer",marginBottom:12,transition:"background 0.2s"}}
            onMouseEnter={e=>!sending&&(e.target.style.background="#e0b85a")}
            onMouseLeave={e=>e.target.style.background=C.ocre}>

          <button onClick={()=>{setEmailStep(false);setDone(true);}}
            style={{background:"none",border:"none",color:C.gris,fontSize:"13px",cursor:"pointer",padding:"8px"}}>
            Continuer sans email
          </button>
          <p style={{fontFamily:serif,fontSize:"11px",fontStyle:"italic",color:"rgba(138,133,121,0.7)",marginTop:24,lineHeight:1.5}}>
            Vos réponses sont confidentielles. Aucune donnée n'est partagée avec des tiers.
          </p>
        </div>
      </div>

  /* ─── RESULTS + RAPPORT ─── */
  if(done){
    const s=sc();
    const maxScore=QS.filter(x=>x.axe).reduce((acc,q)=>acc+(q.options?Math.max(...q.options.map(o=>o.score)):0),0);
    const total=Object.values(s).reduce((a,b)=>a+b,0);
    const zone=getZone(total,maxScore);
    const rd=AXES.map(a=>({axis:a.short,score:s[a.key]}));
    const today=new Date().toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});

    // Calcul axe max par axe
    function axeMax(key){return QS.filter(x=>x.axe===key).reduce((acc,q)=>acc+(q.options?Math.max(...q.options.map(o=>o.score)):0),0);}

    // Axes triés du plus faible au plus fort (points de vigilance en premier)
    const axesSorted=[...AXES].sort((a,b)=>{
      const pa=axeMax(a.key)>0?s[a.key]/axeMax(a.key):0;
      const pb=axeMax(b.key)>0?s[b.key]/axeMax(b.key):0;
      return pa-pb;

    const hasOpen = opn["open1"]||opn["openM"]||opn["open2"]||opn["open3"];

    return(

                <span style={{fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:C.gris,fontWeight:600}}>Profil sur 5 axes</span>

                  <div key={o.id} style={{background:C.blanc,padding:"18px 22px",marginBottom:10,borderLeft:"3px solid "+C.ocre,boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
                    <div style={{fontSize:"10px",color:C.gris,fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:"1.5px"}}>{o.label}</div>
                    <p style={{fontFamily:serif,fontSize:"15px",color:C.grisFonce,lineHeight:1.7,fontStyle:"italic"}}>« {opn[o.id]} »</p>
                  </div>
                ):null)}
                <p style={{fontSize:"13px",color:C.gris,fontStyle:"italic",marginTop:8,lineHeight:1.6}}>
                  Ces notes sont votre matière première. Gardez-les — elles seront utiles lors du test de robustesse avec votre Codir.
                </p>
              </div>
            )}

            {/* ══ SUITE RECOMMANDÉE ══ */}
            <div style={{background:C.sable,padding:"28px 32px",marginBottom:28,borderTop:"4px solid "+C.ocre}}>
              <div style={{fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:C.gris,fontWeight:600,marginBottom:16}}>Quelle est la prochaine étape ?</div>
              <p style={{fontSize:"15px",color:C.grisFonce,lineHeight:1.8,marginBottom:20}}>
                Ce diagnostic individuel est une première lecture — celle de votre lucidité personnelle sur votre entreprise. Elle est précieuse. Elle est aussi incomplète : d'autres membres de votre Codir ont probablement une lecture différente des mêmes réalités.
              </p>
              <p style={{fontSize:"15px",color:C.grisFonce,lineHeight:1.8,marginBottom:24}}>
                <strong>Le test de robustesse</strong> est une simulation stratégique de 3 heures avec l'ensemble de votre Codir. En partant de votre chaîne de valeur réelle, en la soumettant à un scénario de crise, vous découvrez collectivement où sont les vraies fractures — et vous repartez avec des décisions concrètes à 30 jours.
              </p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:12,marginBottom:24}}>
                {[
                  {n:"01",t:"Cartographier",d:"Votre chaîne de valeur complète — de vos fournisseurs à vos clients."},
                  {n:"02",t:"Tester",d:"Un scénario de choc réel : perte de client, rupture, crise réglementaire."},
                  {n:"03",t:"Décider",d:"3 déplacements stratégiques concrets. Un premier pas à 30 jours."},
                ].map(item=>(
                  <div key={item.n} style={{background:C.blanc,padding:"16px",borderTop:"3px solid "+C.vert}}>
                    <div style={{fontFamily:serif,fontSize:"24px",fontWeight:700,color:C.vert,opacity:0.3,lineHeight:1,marginBottom:6}}>{item.n}</div>
                    <div style={{fontSize:"13px",fontWeight:700,color:C.grisFonce,marginBottom:6}}>{item.t}</div>
                    <p style={{fontSize:"12px",color:C.gris,lineHeight:1.5}}>{item.d}</p>
                  </div>
                ))}
              </div>
              <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                <button className="no-print"
                  style={{background:C.vert,color:C.blanc,border:"none",padding:"14px 28px",fontSize:"14px",fontWeight:700,cursor:"pointer",transition:"background 0.2s"}}
                  onMouseEnter={e=>e.target.style.background=C.vertClair}
                  onMouseLeave={e=>e.target.style.background=C.vert}>
                  Réserver un échange de cadrage →
                </button>
                {mode==="magnet"&&(
                  <button className="no-print"
                    onClick={()=>{setMode("complet");setStp(0);setAns({});setSel({});setOpn({});setDone(false);setSent(false);setEmail("");}}
                    style={{background:"none",border:"2px solid "+C.vert,color:C.vert,padding:"12px 24px",fontSize:"14px",fontWeight:600,cursor:"pointer",transition:"all 0.2s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=C.vert;e.currentTarget.style.color=C.blanc;}}
                    onMouseLeave={e=>{e.currentTarget.style.background="none";e.currentTarget.style.color=C.vert;}}>
                    Faire le diagnostic complet (30 questions) →
                  </button>
                )}
              </div>
            </div>

            {/* ══ FOOTER RAPPORT ══ */}
            <div style={{textAlign:"center",paddingTop:16,borderTop:"1px solid "+C.sable}}>
              <p style={{fontFamily:serif,fontSize:"12px",fontStyle:"italic",color:C.gris,lineHeight:1.5}}>{BASELINE}</p>
              <p style={{fontSize:"11px",color:C.gris,marginTop:4}}>Open Lande · openlande.co · {today}</p>
            </div>
          </div>
        </div>
      </div>
    );
  }

  /* ─── QUESTIONS ─── */
  return(
    <div style={{minHeight:"100vh",background:C.creme,display:"flex",flexDirection:"column"}}>
      {/* Top bar */}
      <div style={{padding:"16px 20px 0"}}>
        <div style={{maxWidth:640,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:20,height:20,opacity:0.45}}>
              <Cerne size={200} rings={10} sw={1.8} op={0.8} cx={100} cy={100} maxR={88}/>
            </div>
            <div style={{fontSize:"11px",letterSpacing:"3px",textTransform:"uppercase",color:C.gris,fontWeight:600}}>
              {isS?"Question "+sI+" / "+tS:isM?"Question miroir":"Question ouverte"}
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {aI>=0&&<div style={{fontSize:"12px",color:C.vert,fontWeight:600}}>{AXES[aI].short}</div>}
            <div style={{fontSize:"11px",color:C.gris,background:C.sable,padding:"3px 8px",borderRadius:2}}>
              {mode === "magnet" ? "Court" : "Complet"}
            </div>
          </div>
        </div>
        <div style={{maxWidth:640,margin:"0 auto"}}>
          <div style={{width:"100%",height:3,background:C.sable,borderRadius:2}}>
            <div style={{width:((stp+1)/QS.length*100)+"%",height:"100%",background:C.ocre,borderRadius:2,transition:"width 0.5s cubic-bezier(0.4,0,0.2,1)"}}/>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{
        flex:1,display:"flex",flexDirection:"column",justifyContent:"center",
        padding:"32px 20px",maxWidth:640,margin:"0 auto",width:"100%",
        opacity:anim?0:1,transform:anim?"translateY(12px)":"translateY(0)",
        transition:"opacity 0.28s, transform 0.28s",
      }}>
        {aI>=0&&<div style={{display:"flex",gap:4,marginBottom:20}}>
          {AXES.map((a,i)=><div key={a.key} style={{flex:1,height:4,background:i===aI?C.vert:C.sable,borderRadius:2,transition:"background 0.3s"}}/>)}
        </div>}
        {isS&&q.axe&&<div style={{fontSize:"12px",fontWeight:600,color:C.ocre,letterSpacing:"2px",textTransform:"uppercase",marginBottom:12}}>{AXES.find(a=>a.key===q.axe)?.label}</div>}
        {isM&&<div style={{width:48,height:48,borderRadius:"50%",background:C.vert,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:20,color:C.ocre,fontSize:"22px",fontWeight:700}}>◈</div>}

        <h2 style={{fontFamily:serif,fontSize:"clamp(18px, 3vw, 24px)",color:C.vert,fontWeight:700,lineHeight:1.4,marginBottom:q.note?12:(isM?16:32)}}>{q.text}</h2>

        {q.note&&<p style={{fontSize:"13px",color:C.gris,fontStyle:"italic",marginBottom:28,lineHeight:1.5,borderLeft:"3px solid "+C.ocre,paddingLeft:12}}>{q.note}</p>}
        {isM&&q.subtext&&<p style={{fontSize:"15px",color:C.gris,lineHeight:1.6,fontStyle:"italic",marginBottom:40,maxWidth:520}}>{q.subtext}</p>}

        {isS&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
          {q.options.map((o,i)=>{const it=sel[q.id]===i;return(
            <button key={i} onClick={()=>{setAns({...ans,[q.id]:o.score});setSel({...sel,[q.id]:i});setTimeout(nxt,400);}}
              style={{width:"100%",padding:"16px 20px",textAlign:"left",border:"2px solid "+(it?C.vert:C.sable),background:it?C.vert:C.blanc,color:it?C.blanc:C.grisFonce,cursor:"pointer",transition:"all 0.2s",fontSize:"15px",lineHeight:1.4,display:"flex",alignItems:"center",gap:14}}>
              <span style={{width:28,height:28,borderRadius:"50%",flexShrink:0,border:"2px solid "+(it?C.ocre:C.sable),background:it?C.ocre:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:700,color:it?C.vert:C.gris,transition:"all 0.2s"}}>
                {it?"✓":String.fromCharCode(65+i)}
              </span>
              <span>{o.label}</span>
            </button>
          );})}
        </div>}

        {isO&&<div>
          <textarea value={opn[q.id]||""} onChange={e=>setOpn({...opn,[q.id]:e.target.value})}
            placeholder="Votre réponse (facultatif)..."
            onFocus={e=>e.target.style.borderColor=C.vert} onBlur={e=>e.target.style.borderColor=C.sable}
            style={{width:"100%",minHeight:100,padding:16,border:"2px solid "+C.sable,background:C.blanc,fontSize:"15px",color:C.grisFonce,resize:"vertical",outline:"none",lineHeight:1.5,fontFamily:"inherit"}}/>
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
            <button onClick={nxt} onMouseEnter={e=>e.target.style.background=C.vertClair} onMouseLeave={e=>e.target.style.background=C.vert}
              style={{background:C.vert,color:C.blanc,border:"none",padding:"12px 32px",fontSize:"14px",fontWeight:600,cursor:"pointer",transition:"background 0.2s"}}>
              {opn[q.id]?.trim()?"Continuer →":"Passer →"}
            </button>
          </div>
        </div>}

        {isM&&<div style={{display:"flex",justifyContent:"flex-end"}}>
          <button onClick={nxt} onMouseEnter={e=>e.target.style.background=C.vertClair} onMouseLeave={e=>e.target.style.background=C.vert}
            style={{background:C.vert,color:C.blanc,border:"none",padding:"12px 32px",fontSize:"14px",fontWeight:600,cursor:"pointer",transition:"background 0.2s"}}>
            Voir mes résultats →
          </button>
        </div>}
      </div>

      {stp>0&&<div style={{padding:"0 20px 24px",maxWidth:640,margin:"0 auto",width:"100%"}}>
        <button onClick={bck} style={{background:"none",border:"none",color:C.gris,fontSize:"13px",cursor:"pointer",padding:"8px 0"}}>← Revenir</button>
      </div>}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
</body>
</html>
